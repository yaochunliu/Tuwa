<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HD 墨水屏文件编辑器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --eink-bg: #e8e6e0;
  --eink-fg: #1a1a1a;
  --eink-gray: #888;
  --sidebar-bg: #2c2c2c;
  --sidebar-fg: #ddd;
  --sidebar-hover: #3a3a3a;
  --sidebar-active: #4a6fa5;
  --accent: #4a6fa5;
  --accent-light: #6a8fc5;
  --border: #d0cec8;
  --panel-bg: #f5f3ee;
  --danger: #c54a4a;
  --success: #4a9c4a;
  --warn: #c49a4a;
  --mono: 'Consolas', 'Monaco', 'Courier New', monospace;
  --serif: 'Noto Serif SC', 'Songti SC', 'STSong', 'SimSun', serif;
}

body {
  font-family: var(--serif);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--eink-bg);
  color: var(--eink-fg);
}

/* Header */
.header {
  background: var(--sidebar-bg);
  color: var(--sidebar-fg);
  padding: 0 16px;
  height: 48px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 2px solid #1a1a1a;
  flex-shrink: 0;
}
.header-title {
  font-size: 16px;
  font-weight: bold;
  white-space: nowrap;
}
.header-btn {
  background: var(--sidebar-hover);
  color: var(--sidebar-fg);
  border: none;
  padding: 6px 14px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 13px;
  transition: background 0.2s;
  font-family: var(--serif);
}
.header-btn:hover { background: var(--accent); }
.header-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.header-btn.primary { background: var(--accent); }
.header-btn.primary:hover { background: var(--accent-light); }
.header-spacer { flex: 1; }
.header-info {
  font-size: 12px;
  color: #999;
  font-family: var(--mono);
}

/* Main Layout */
.main {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* Sidebar */
.sidebar {
  width: 280px;
  background: var(--sidebar-bg);
  color: var(--sidebar-fg);
  display: flex;
  flex-direction: column;
  border-right: 1px solid #1a1a1a;
  flex-shrink: 0;
}
.sidebar-header {
  padding: 10px 14px;
  font-size: 13px;
  font-weight: bold;
  border-bottom: 1px solid #1a1a1a;
  display: flex;
  align-items: center;
  gap: 8px;
}
.sidebar-search {
  padding: 8px 10px;
  border-bottom: 1px solid #1a1a1a;
}
.sidebar-search input {
  width: 100%;
  padding: 6px 10px;
  border: none;
  border-radius: 4px;
  background: #1a1a1a;
  color: #ddd;
  font-size: 13px;
  font-family: var(--serif);
}
.sidebar-search input:focus { outline: 1px solid var(--accent); }
.poem-list {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: #555 transparent;
}
.poem-list::-webkit-scrollbar { width: 6px; }
.poem-list::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
.poem-item {
  padding: 8px 14px;
  cursor: pointer;
  border-bottom: 1px solid #333;
  transition: background 0.15s;
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.poem-item:hover { background: var(--sidebar-hover); }
.poem-item.active { background: var(--sidebar-active); }
.poem-item .num {
  color: #777;
  font-size: 11px;
  font-family: var(--mono);
  min-width: 24px;
}
.poem-item.active .num { color: #ccd; }
.poem-item .title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Content Area */
.content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--panel-bg);
}

/* Tabs */
.tabs {
  display: flex;
  background: var(--eink-bg);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.tab {
  padding: 10px 20px;
  cursor: pointer;
  font-size: 13px;
  border: none;
  background: transparent;
  color: var(--eink-gray);
  border-bottom: 3px solid transparent;
  transition: all 0.2s;
  font-family: var(--serif);
}
.tab:hover { color: var(--eink-fg); }
.tab.active {
  color: var(--eink-fg);
  border-bottom-color: var(--accent);
  font-weight: bold;
}

/* Tab Content */
.tab-content {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  scrollbar-width: thin;
}
.tab-content::-webkit-scrollbar { width: 8px; }
.tab-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.tab-pane { display: none; }
.tab-pane.active { display: block; }

/* E-ink Display */
.eink-device {
  max-width: 600px;
  margin: 0 auto;
  background: #333;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
.eink-screen {
  background: var(--eink-bg);
  border-radius: 4px;
  padding: 32px 28px;
  min-height: 500px;
  position: relative;
  font-family: var(--serif);
  color: var(--eink-fg);
  background-image: 
    radial-gradient(circle at 20% 30%, rgba(0,0,0,0.02) 1px, transparent 1px),
    radial-gradient(circle at 60% 70%, rgba(0,0,0,0.015) 1px, transparent 1px);
  background-size: 4px 4px, 6px 6px;
}
.eink-screen::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 50%, rgba(0,0,0,0.03) 100%);
  pointer-events: none;
  border-radius: 4px;
}
.eink-title {
  text-align: center;
  font-size: 24px;
  font-weight: bold;
  margin-bottom: 8px;
  letter-spacing: 4px;
}
.eink-author {
  text-align: center;
  font-size: 13px;
  color: var(--eink-gray);
  margin-bottom: 24px;
}
.eink-divider {
  text-align: center;
  color: var(--eink-gray);
  margin: 16px 0;
  font-size: 12px;
  letter-spacing: 8px;
}
.eink-poem-text {
  font-size: 18px;
  line-height: 2.2;
  text-align: center;
  letter-spacing: 2px;
  white-space: pre-wrap;
}
.eink-translation {
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px dashed var(--eink-gray);
  font-size: 14px;
  line-height: 1.8;
  color: #555;
}
.eink-annotation {
  margin-top: 16px;
  padding-top: 12px;
  border-top: 1px dashed var(--eink-gray);
  font-size: 13px;
  line-height: 1.7;
  color: #666;
}
.eink-annotation-title {
  font-weight: bold;
  margin-bottom: 6px;
  font-size: 13px;
}
.eink-controls {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-top: 20px;
  padding-top: 16px;
}
.eink-nav-btn {
  background: transparent;
  border: 1px solid var(--eink-gray);
  color: var(--eink-fg);
  padding: 6px 16px;
  border-radius: 4px;
  cursor: pointer;
  font-family: var(--serif);
  font-size: 13px;
}
.eink-nav-btn:hover { background: rgba(0,0,0,0.05); }
.eink-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* Details View */
.details-container {
  max-width: 800px;
  margin: 0 auto;
}
.detail-section {
  background: white;
  border-radius: 8px;
  padding: 20px 24px;
  margin-bottom: 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}
.detail-section h3 {
  font-size: 15px;
  color: var(--accent);
  margin-bottom: 12px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 8px;
}
.detail-row {
  display: flex;
  margin-bottom: 8px;
  font-size: 14px;
}
.detail-label {
  width: 120px;
  color: var(--eink-gray);
  flex-shrink: 0;
}
.detail-value {
  flex: 1;
  color: var(--eink-fg);
}
.detail-text-block {
  font-size: 15px;
  line-height: 2;
  margin: 8px 0;
  padding: 12px;
  background: var(--eink-bg);
  border-radius: 6px;
  white-space: pre-wrap;
}
.detail-entry-list {
  font-size: 12px;
  font-family: var(--mono);
}
.detail-entry {
  padding: 4px 8px;
  margin: 2px 0;
  background: #f0eeea;
  border-radius: 4px;
  border-left: 3px solid var(--accent);
}
.entry-type-1 { border-left-color: #4a9c4a; }
.entry-type-2 { border-left-color: var(--accent); }
.entry-type-4 { border-left-color: var(--danger); }

/* Image Viewer */
.image-viewer {
  max-width: 900px;
  margin: 0 auto;
}
.image-controls {
  background: white;
  border-radius: 8px;
  padding: 16px 20px;
  margin-bottom: 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}
.image-controls h3 {
  font-size: 15px;
  margin-bottom: 12px;
}
.control-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
  font-size: 13px;
}
.control-row label {
  min-width: 100px;
  color: var(--eink-gray);
}
.control-row select, .control-row input {
  padding: 4px 8px;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 13px;
  font-family: var(--mono);
}
.control-row button {
  padding: 4px 12px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-size: 13px;
}
.control-row button:hover { background: var(--accent-light); }
.image-canvas-container {
  background: white;
  border-radius: 8px;
  padding: 20px;
  text-align: center;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}
#imageCanvas {
  max-width: 100%;
  border: 1px solid var(--border);
  image-rendering: pixelated;
}
.image-info {
  font-size: 12px;
  color: var(--eink-gray);
  margin-top: 8px;
  font-family: var(--mono);
}

/* Hex Viewer */
.hex-viewer {
  font-family: var(--mono);
  font-size: 12px;
  background: #1a1a1a;
  color: #ddd;
  padding: 16px;
  border-radius: 8px;
  overflow-x: auto;
  line-height: 1.6;
  max-height: 600px;
  overflow-y: auto;
}
.hex-line {
  display: flex;
  gap: 16px;
  white-space: nowrap;
}
.hex-offset { color: #6a8fc5; min-width: 80px; }
.hex-bytes { color: #ddd; }
.hex-ascii { color: #8a8; }

/* Editor */
.editor-container {
  max-width: 800px;
  margin: 0 auto;
}
.editor-section {
  background: white;
  border-radius: 8px;
  padding: 20px 24px;
  margin-bottom: 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}
.editor-section h3 {
  font-size: 15px;
  color: var(--accent);
  margin-bottom: 12px;
}
.editor-field {
  margin-bottom: 12px;
}
.editor-field label {
  display: block;
  font-size: 13px;
  color: var(--eink-gray);
  margin-bottom: 4px;
}
.editor-field input, .editor-field textarea {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 14px;
  font-family: var(--serif);
  resize: vertical;
}
.editor-field input:focus, .editor-field textarea:focus {
  outline: none;
  border-color: var(--accent);
}
.editor-field textarea { min-height: 60px; }
.editor-actions {
  display: flex;
  gap: 12px;
  margin-top: 16px;
}
.editor-btn {
  padding: 8px 20px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-size: 14px;
  font-family: var(--serif);
}
.editor-btn.save { background: var(--success); color: white; }
.editor-btn.save:hover { opacity: 0.85; }
.editor-btn.cancel { background: var(--border); color: var(--eink-fg); }

/* Metadata Editor */
.meta-editor-field {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.meta-editor-field label {
  min-width: 120px;
  font-size: 13px;
  color: var(--eink-gray);
}
.meta-editor-field input {
  flex: 1;
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 13px;
}

/* New File Dialog */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
.modal {
  background: white;
  border-radius: 8px;
  padding: 24px 32px;
  max-width: 500px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
.modal h2 {
  margin-bottom: 16px;
  font-size: 18px;
}

/* Status Bar */
.status-bar {
  background: var(--sidebar-bg);
  color: #999;
  padding: 4px 16px;
  font-size: 11px;
  font-family: var(--mono);
  display: flex;
  gap: 16px;
  flex-shrink: 0;
}

/* Drop Zone */
.drop-zone {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(74, 111, 165, 0.9);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 2000;
  pointer-events: none;
}
.drop-zone.active { display: flex; }
.drop-zone-inner {
  border: 4px dashed white;
  border-radius: 16px;
  padding: 60px 80px;
  color: white;
  font-size: 24px;
  text-align: center;
}

/* Empty State */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--eink-gray);
  gap: 16px;
}
.empty-state svg { opacity: 0.3; }
.empty-state p { font-size: 16px; }
.empty-state .hint { font-size: 13px; opacity: 0.6; }

/* Toast */
.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--sidebar-bg);
  color: white;
  padding: 10px 24px;
  border-radius: 6px;
  font-size: 14px;
  z-index: 3000;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }
.toast.error { background: var(--danger); }
.toast.success { background: var(--success); }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">📖 HD 墨水屏文件编辑器</div>
  <button class="header-btn" onclick="openFile()">📂 打开 .HD</button>
  <button class="header-btn" onclick="saveFile()" id="btnSave" disabled>💾 保存</button>
  <button class="header-btn" onclick="saveAsFile()" id="btnSaveAs" disabled>💾 另存为</button>
  <button class="header-btn" onclick="showNewFileDialog()" id="btnNew">📄 新建</button>
  <div class="header-spacer"></div>
  <div class="header-info" id="headerInfo">未加载文件</div>
  <button class="header-btn" onclick="showHelp()">❓ 帮助</button>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-header">
      📋 诗词列表
      <span id="poemCount" style="color:#777;font-size:11px;"></span>
    </div>
    <div class="sidebar-search">
      <input type="text" placeholder="搜索诗词..." oninput="filterPoems(this.value)">
    </div>
    <div class="poem-list" id="poemList">
      <div class="empty-state" style="padding:40px 20px;">
        <p style="font-size:13px;">请打开 .hd 文件</p>
      </div>
    </div>
  </div>

  <div class="content">
    <div class="tabs" id="tabs" style="display:none;">
      <button class="tab active" data-tab="eink" onclick="switchTab('eink')">📱 墨水屏</button>
      <button class="tab" data-tab="details" onclick="switchTab('details')">📋 详情</button>
      <button class="tab" data-tab="image" onclick="switchTab('image')">🖼️ 图片</button>
      <button class="tab" data-tab="audio" onclick="switchTab('audio')">🔊 音频</button>
      <button class="tab" data-tab="hex" onclick="switchTab('hex')">🔍 十六进制</button>
      <button class="tab" data-tab="editor" onclick="switchTab('editor')">✏️ 编辑</button>
      <button class="tab" data-tab="meta" onclick="switchTab('meta')">⚙️ 元数据</button>
    </div>

    <div class="tab-content" id="tabContent">
      <div class="empty-state" id="emptyState">
        <svg width="80" height="80" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/>
        </svg>
        <p>打开 .hd 文件以开始</p>
        <p class="hint">点击「打开 .HD」按钮或拖拽文件到此处</p>
      </div>

      <div class="tab-pane" id="tab-eink"></div>
      <div class="tab-pane" id="tab-details"></div>
      <div class="tab-pane" id="tab-image"></div>
      <div class="tab-pane" id="tab-audio"></div>
      <div class="tab-pane" id="tab-hex"></div>
      <div class="tab-pane" id="tab-editor"></div>
      <div class="tab-pane" id="tab-meta"></div>
    </div>
  </div>
</div>

<div class="status-bar">
  <span id="statusFile">-</span>
  <span id="statusSize">-</span>
  <span id="statusPoems">-</span>
  <span id="statusMsg" style="flex:1;text-align:right;"></span>
</div>

<div class="drop-zone" id="dropZone">
  <div class="drop-zone-inner">
    📂 拖放 .hd 文件到此处
  </div>
</div>

<div class="toast" id="toast"></div>

<input type="file" id="fileInput" accept=".hd,.txt,.bin" style="display:none;" onchange="handleFileSelect(event)">

<script>
// ============================================================
// HD 文件解析器
// ============================================================
class HDParser {
  constructor() {
    this.data = null;
    this.view = null;
    this.header = {};
    this.metadata = [];
    this.poems = [];
    this.poemOffsets = [];
    this.fileSize = 0;
  }

  parse(arrayBuffer) {
    this.data = new Uint8Array(arrayBuffer);
    this.view = new DataView(arrayBuffer);
    this.fileSize = arrayBuffer.byteLength;

    // 解析文件头 (44 bytes)
    this.header = {
      file_id: this.view.getUint32(0, true),
      field_4: this.view.getUint32(4, true),
      hash1: this.view.getUint32(8, true),
      hash2: this.view.getUint32(12, true),
      version_major: this.view.getUint16(16, true),
      version_minor: this.view.getUint16(18, true),
      version_build: this.view.getUint16(20, true),
      version_rev: this.view.getUint16(22, true),
      field_18: this.view.getUint32(24, true),
      poem_count: this.view.getUint32(28, true),
      data_size: this.view.getUint32(32, true),
      field_24: this.view.getUint32(36, true),
      field_28: this.view.getUint32(40, true),
    };

    // 解析元数据段表
    const metaCount = this.view.getUint32(0x2c, true);
    this.metadata = [];
    let offset = 0x30;
    for (let i = 0; i < metaCount; i++) {
      const ptr = this.view.getUint32(offset, true);
      const type = this.view.getUint16(offset + 4, true);
      const seq = this.view.getUint16(offset + 6, true);
      const size = this.view.getUint32(offset + 8, true);
      let text = '';
      if (ptr > 0 && ptr < this.fileSize) {
        text = this.readString(ptr);
      }
      this.metadata.push({ offset, ptr, type, seq, size, text });
      offset += 12;
    }

    // 解析诗词偏移数组
    const poemCount = this.header.poem_count;
    this.poemOffsets = [];
    for (let i = 0; i < poemCount; i++) {
      this.poemOffsets.push(this.view.getUint32(0x88 + i * 4, true));
    }

    // 解析每首诗词
    this.poems = [];
    for (let i = 0; i < poemCount; i++) {
      this.poems.push(this.parsePoem(i));
    }

    return true;
  }

  parsePoem(index) {
    const blockOff = this.poemOffsets[index];
    const entryCount = this.view.getUint32(blockOff, true);
    const nextBlock = index < this.poemOffsets.length - 1 
      ? this.poemOffsets[index + 1] 
      : this.findStringPoolStart();
    
    const poem = {
      index: index + 1,
      title: '', author: '', dynasty: '',
      stanzas: 0, imgSize: 0, imgOffset: 0,
      desc: '', poemText: [], translations: [], annotations: [],
      entries: [], blockOffset: blockOff,
      blockSize: nextBlock - blockOff,
      entryCount: entryCount
    };

    for (let j = 0; j < entryCount; j++) {
      const off = blockOff + 4 + j * 12;
      const etype = this.data[off];
      const esub = this.data[off + 1];
      const eid = this.view.getUint16(off + 2, true);
      const param1 = this.view.getUint32(off + 4, true);
      const param2 = this.view.getUint32(off + 8, true);

      const entry = { type: etype, sub: esub, id: eid, param1, param2, text: '', value: null };

      if (etype === 0x02) {
        // UTF-8 字符串
        entry.text = this.readString(param2, param1 - 1);
        if (eid === 0x0190) poem.title = entry.text;
        else if (eid === 0x0191) poem.author = entry.text;
        else if (eid === 0x0193) poem.dynasty = entry.text;
        else if (eid === 0x0196) poem.desc = entry.text;
        else if (eid >= 0x07d0 && eid < 0x0fa0) poem.poemText.push(entry.text);
        else if (eid >= 0x0fa0 && eid < 0x1388) poem.translations.push(entry.text);
        else if (eid >= 0x1388) poem.annotations.push(entry.text);
      } else if (etype === 0x01) {
        // uint32 数值
        entry.value = this.view.getUint32(param2, true);
        if (eid === 0x0192) poem.stanzas = entry.value;
      } else if (etype === 0x04) {
        // 图片数据
        poem.imgSize = param1;
        poem.imgOffset = param2;
      }

      poem.entries.push(entry);
    }

    return poem;
  }

  findStringPoolStart() {
    // 字符串池通常在最后一个诗词块之后
    if (this.poems.length > 0) {
      const lastPoem = this.poems[this.poems.length - 1];
      return lastPoem.blockOffset + lastPoem.blockSize;
    }
    return 0x4d40;
  }

  readString(offset, maxLen) {
    if (offset >= this.fileSize) return '';
    let end = offset;
    const limit = maxLen ? Math.min(offset + maxLen, this.fileSize) : this.fileSize;
    while (end < limit && this.data[end] !== 0) end++;
    const bytes = this.data.slice(offset, end);
    return new TextDecoder('utf-8').decode(bytes);
  }

  getImageData(poem) {
    if (poem.imgOffset === 0 || poem.imgSize === 0) return null;
    return this.data.slice(poem.imgOffset, poem.imgOffset + poem.imgSize);
  }

  getBlockHex(poem, maxBytes) {
    const start = poem.blockOffset;
    const end = Math.min(start + (maxBytes || 512), start + poem.blockSize);
    return this.data.slice(start, end);
  }
}

// ============================================================
// HD 文件写入器
// ============================================================
class HDWriter {
  constructor() {
    this.buffers = [];
  }

  build(parser) {
    // 重新构建整个文件
    // 1. 收集所有字符串
    const stringPool = new Map();
    let stringOffset = 0;
    const stringData = [];

    const addString = (str) => {
      if (stringPool.has(str)) return stringPool.get(str);
      const bytes = new TextEncoder().encode(str);
      const offset = stringOffset;
      stringPool.set(str, { offset, length: bytes.length + 1 });
      stringData.push(...bytes, 0);
      stringOffset += bytes.length + 1;
      return { offset, length: bytes.length + 1 };
    };

    // 2. 收集元数据字符串
    for (const meta of parser.metadata) {
      if (meta.text) {
        const s = addString(meta.text);
        meta._ptr = s.offset;
        meta._size = s.length;
      }
    }

    // 3. 收集诗词字符串
    for (const poem of parser.poems) {
      for (const entry of poem.entries) {
        if (entry.type === 0x02 && entry.text !== undefined) {
          const s = addString(entry.text);
          entry._param2 = s.offset;
          entry._param1 = s.length;
        }
      }
    }

    // 4. 构建各段
    const headerSize = 44;
    const metaTableSize = 4 + parser.metadata.length * 12;
    const offsetArraySize = parser.poems.length * 4;
    
    // 标题索引区域大小估算
    const titleIndexSize = parser.poems.length * 24;
    
    // 诗词块区域
    const poemBlocksStart = headerSize + metaTableSize + offsetArraySize + titleIndexSize + 16;
    
    // 构建诗词块
    const poemBlocks = [];
    let currentBlockOffset = poemBlocksStart;
    const poemOffsets = [];

    for (const poem of parser.poems) {
      poemOffsets.push(currentBlockOffset);
      const blockData = this.buildPoemBlock(poem);
      poemBlocks.push(blockData);
      currentBlockOffset += blockData.length;
    }

    // 字符串池起始
    const stringPoolStart = currentBlockOffset;
    const stringPoolData = new Uint8Array(stringData);

    // 图片数据起始
    const imageDataStart = stringPoolStart + stringPoolData.length;

    // 收集图片数据并更新偏移
    let currentImgOffset = imageDataStart;
    const allImageData = [];
    for (let i = 0; i < parser.poems.length; i++) {
      const poem = parser.poems[i];
      if (poem.imgOffset > 0 && poem.imgSize > 0 && parser.data) {
        const imgData = parser.data.slice(poem.imgOffset, poem.imgOffset + poem.imgSize);
        // 更新图片偏移
        for (const entry of poem.entries) {
          if (entry.type === 0x04) {
            entry._param2 = currentImgOffset;
          }
        }
        allImageData.push(imgData);
        currentImgOffset += imgData.length;
      }
    }

    // 重新构建诗词块（使用更新后的偏移）
    const finalPoemBlocks = [];
    currentBlockOffset = poemBlocksStart;
    for (let i = 0; i < parser.poems.length; i++) {
      poemOffsets[i] = currentBlockOffset;
      const blockData = this.buildPoemBlock(parser.poems[i], stringPoolStart, stringPool);
      finalPoemBlocks.push(blockData);
      currentBlockOffset += blockData.length;
    }

    // 重新计算字符串池和图片偏移
    const finalStringPoolStart = currentBlockOffset;
    const finalImageDataStart = finalStringPoolStart + stringPoolData.length;

    // 需要再次更新字符串偏移和图片偏移
    // 由于偏移变了，需要重新计算
    // 这里采用简化方案：保持原有偏移结构不变，只替换文本内容

    // 最终方案：保持原始文件结构，只替换修改的文本
    return this.buildModified(parser);
  }

  buildPoemBlock(poem, stringPoolStart, stringPool) {
    const entryCount = poem.entries.length;
    const blockSize = 4 + entryCount * 12;
    const buf = new ArrayBuffer(blockSize);
    const view = new DataView(buf);
    const data = new Uint8Array(buf);

    view.setUint32(0, entryCount, true);

    for (let j = 0; j < entryCount; j++) {
      const entry = poem.entries[j];
      const off = 4 + j * 12;
      data[off] = entry.type;
      data[off + 1] = entry.sub;
      view.setUint16(off + 2, entry.id, true);
      
      if (entry.type === 0x02) {
        view.setUint32(off + 4, entry._param1 || entry.param1, true);
        view.setUint32(off + 8, (stringPoolStart || 0) + (entry._param2 || 0), true);
      } else if (entry.type === 0x01) {
        view.setUint32(off + 4, entry.param1, true);
        view.setUint32(off + 8, entry._param2 || entry.param2, true);
      } else if (entry.type === 0x04) {
        view.setUint32(off + 4, entry._param1 || entry.param1, true);
        view.setUint32(off + 8, entry._param2 || entry.param2, true);
      } else {
        view.setUint32(off + 4, entry.param1, true);
        view.setUint32(off + 8, entry.param2, true);
      }
    }

    return data;
  }

  buildModified(parser) {
    // 简化方案：复制原始文件，只替换修改的文本
    const original = parser.data;
    const result = new Uint8Array(original);
    const view = new DataView(result.buffer);

    // 替换元数据文本
    for (const meta of parser.metadata) {
      if (meta.text !== undefined && meta._modified) {
        const newBytes = new TextEncoder().encode(meta.text);
        // 在原位置写入新文本
        for (let i = 0; i < newBytes.length; i++) {
          if (meta.ptr + i < result.length) {
            result[meta.ptr + i] = newBytes[i];
          }
        }
        // 写入null终止符
        if (meta.ptr + newBytes.length < result.length) {
          result[meta.ptr + newBytes.length] = 0;
        }
      }
    }

    // 替换诗词文本
    for (const poem of parser.poems) {
      for (const entry of poem.entries) {
        if (entry.type === 0x02 && entry._modified) {
          const newBytes = new TextEncoder().encode(entry.text);
          // 在原位置写入新文本
          for (let i = 0; i < newBytes.length && i < entry.param1 - 1; i++) {
            if (entry.param2 + i < result.length) {
              result[entry.param2 + i] = newBytes[i];
            }
          }
          // 用null填充剩余空间
          for (let i = newBytes.length; i < entry.param1 - 1; i++) {
            if (entry.param2 + i < result.length) {
              result[entry.param2 + i] = 0;
            }
          }
        }
      }
    }

    return result;
  }
}

// ============================================================
// 图片解码器
// ============================================================
class ImageDecoder {
  static MAGIC = [0x91, 0x87, 0xA3, 0x98, 0xE3, 0x3B, 0x37, 0xF4];

  static decode(data, width, height, bpp, mode) {
    const payload = data.slice(8); // 跳过8字节magic header
    
    if (mode === 'raw') {
      return this.decodeRaw(payload, width, height, bpp);
    } else if (mode === 'xor') {
      const xored = this.xorDecrypt(data, this.MAGIC);
      return this.decodeRaw(xored.slice(8), width, height, bpp);
    } else if (mode === 'rc4') {
      const decrypted = this.rc4Decrypt(this.MAGIC, data.slice(8));
      return this.decodeRaw(decrypted, width, height, bpp);
    }
    return null;
  }

  static xorDecrypt(data, key) {
    const result = new Uint8Array(data.length);
    for (let i = 0; i < data.length; i++) {
      result[i] = data[i] ^ key[i % key.length];
    }
    return result;
  }

  static rc4Decrypt(key, data) {
    const S = new Array(256);
    for (let i = 0; i < 256; i++) S[i] = i;
    let j = 0;
    for (let i = 0; i < 256; i++) {
      j = (j + S[i] + key[i % key.length]) % 256;
      [S[i], S[j]] = [S[j], S[i]];
    }
    const result = new Uint8Array(data.length);
    let i2 = 0, j2 = 0;
    for (let k = 0; k < data.length; k++) {
      i2 = (i2 + 1) % 256;
      j2 = (j2 + S[i2]) % 256;
      [S[i2], S[j2]] = [S[j2], S[i2]];
      result[k] = data[k] ^ S[(S[i2] + S[j2]) % 256];
    }
    return result;
  }

  static decodeRaw(data, width, height, bpp) {
    const canvas = document.createElement('canvas');
    canvas.width = width;
    canvas.height = height;
    const ctx = canvas.getContext('2d');
    const imageData = ctx.createImageData(width, height);
    const pixels = imageData.data;

    if (bpp === 1) {
      // 1位深度：每个bit一个像素
      for (let i = 0; i < width * height; i++) {
        const byteIdx = Math.floor(i / 8);
        const bitIdx = 7 - (i % 8);
        if (byteIdx >= data.length) break;
        const bit = (data[byteIdx] >> bitIdx) & 1;
        const val = bit ? 0 : 255;
        pixels[i * 4] = val;
        pixels[i * 4 + 1] = val;
        pixels[i * 4 + 2] = val;
        pixels[i * 4 + 3] = 255;
      }
    } else if (bpp === 4) {
      // 4位深度：每个nibble一个像素
      for (let i = 0; i < width * height; i++) {
        const byteIdx = Math.floor(i / 2);
        if (byteIdx >= data.length) break;
        const nibble = i % 2 === 0 ? (data[byteIdx] >> 4) & 0x0F : data[byteIdx] & 0x0F;
        const val = nibble * 17;
        pixels[i * 4] = val;
        pixels[i * 4 + 1] = val;
        pixels[i * 4 + 2] = val;
        pixels[i * 4 + 3] = 255;
      }
    } else if (bpp === 8) {
      // 8位深度：每个byte一个像素
      for (let i = 0; i < width * height; i++) {
        if (i >= data.length) break;
        const val = data[i];
        pixels[i * 4] = val;
        pixels[i * 4 + 1] = val;
        pixels[i * 4 + 2] = val;
        pixels[i * 4 + 3] = 255;
      }
    }

    ctx.putImageData(imageData, 0, 0);
    return canvas;
  }

  static renderHex(data, bytesPerRow) {
    const rows = [];
    for (let i = 0; i < Math.min(data.length, 4096); i += bytesPerRow) {
      const slice = data.slice(i, i + bytesPerRow);
      const hex = Array.from(slice).map(b => b.toString(16).padStart(2, '0')).join(' ');
      const ascii = Array.from(slice).map(b => b >= 32 && b < 127 ? String.fromCharCode(b) : '.').join('');
      rows.push({ offset: i, hex, ascii });
    }
    return rows;
  }

  static calculateScore(data, width, bpp) {
    // 计算图像质量分数：水平相关性越高越好
    const payload = data.slice(8);
    let score = 0;
    let count = 0;
    const pixelsPerByte = 8 / bpp;
    const totalPixels = Math.min(payload.length * pixelsPerByte, width * 2000);

    // 检查水平相邻像素的相关性
    for (let y = 0; y < Math.floor(totalPixels / width) - 1; y++) {
      for (let x = 0; x < width - 1; x++) {
        const idx = y * width + x;
        const byteIdx1 = Math.floor(idx / pixelsPerByte);
        const byteIdx2 = Math.floor((idx + 1) / pixelsPerByte);
        if (byteIdx1 >= payload.length || byteIdx2 >= payload.length) continue;

        let v1, v2;
        if (bpp === 8) {
          v1 = payload[byteIdx1];
          v2 = payload[byteIdx2];
        } else if (bpp === 4) {
          v1 = (idx % 2 === 0) ? (payload[byteIdx1] >> 4) & 0x0F : payload[byteIdx1] & 0x0F;
          v2 = ((idx+1) % 2 === 0) ? (payload[byteIdx2] >> 4) & 0x0F : payload[byteIdx2] & 0x0F;
          v1 *= 17; v2 *= 17;
        } else {
          continue;
        }
        score += Math.abs(v1 - v2) < 30 ? 1 : 0;
        count++;
      }
    }
    return count > 0 ? score / count : 0;
  }

  static autoDetect(data) {
    // 自动尝试所有组合，返回最佳结果
    const widths = [200, 256, 300, 320, 384, 400, 480, 512, 600, 640, 720, 758, 768, 800, 960, 1024, 1072, 1200, 1404, 1448, 1536, 1872];
    const bpps = [8, 4, 1];
    const modes = ['raw', 'xor', 'rc4'];
    let best = { score: 0, width: 0, height: 0, bpp: 0, mode: '' };

    for (const mode of modes) {
      let workData = data;
      if (mode === 'xor') {
        workData = new Uint8Array(data.length);
        for (let i = 0; i < data.length; i++) {
          workData[i] = data[i] ^ this.MAGIC[i % 8];
        }
      }
      const payload = workData.slice(8);
      const payloadLen = payload.length;

      for (const bpp of bpps) {
        const pixelsPerByte = 8 / bpp;
        const totalPixels = Math.floor(payloadLen * pixelsPerByte);
        for (const w of widths) {
          if (totalPixels % w !== 0) continue;
          const h = totalPixels / w;
          if (h < 50 || h > 8192) continue;
          const score = this.calculateScore(workData, w, bpp);
          if (score > best.score) {
            best = { score, width: w, height: h, bpp, mode };
          }
        }
      }
    }
    return best;
  }
}

// ============================================================
// 全局状态
// ============================================================
let parser = null;
let writer = null;
let currentPoemIndex = -1;
let currentTab = 'eink';
let originalFileName = '';
let isModified = false;

// ============================================================
// 文件操作
// ============================================================
function openFile() {
  document.getElementById('fileInput').click();
}

function handleFileSelect(event) {
  const file = event.target.files[0];
  if (file) loadFile(file);
  event.target.value = '';
}

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      parser = new HDParser();
      parser.parse(e.target.result);
      originalFileName = file.name;
      isModified = false;
      
      updateUI();
      showToast(`已加载: ${file.name} (${parser.poems.length} 首诗词)`, 'success');
    } catch (err) {
      showToast('文件解析失败: ' + err.message, 'error');
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

function saveFile() {
  if (!parser) return;
  writer = new HDWriter();
  const data = writer.build(parser);
  const blob = new Blob([data], { type: 'application/octet-stream' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = originalFileName || 'output.hd';
  a.click();
  URL.revokeObjectURL(url);
  isModified = false;
  showToast('文件已保存', 'success');
}

function saveAsFile() {
  if (!parser) return;
  const name = prompt('请输入文件名:', originalFileName || 'output.hd');
  if (!name) return;
  originalFileName = name;
  saveFile();
}

function showNewFileDialog() {

function createNewFile() {
  const title = document.getElementById('newBookTitle').value;
  const category = document.getElementById('newBookCategory').value;
  const version = document.getElementById('newBookVersion').value;
  const count = parseInt(document.getElementById('newPoemCount').value);

  // 创建最小化的 HD 文件结构
  const headerSize = 44;
  const metaCount = 4;
  const metaTableSize = 4 + metaCount * 12;
  const offsetArraySize = count * 4;
  const titleIndexSize = count * 24 + 16;
  const poemBlocksStart = headerSize + metaTableSize + offsetArraySize + titleIndexSize;
  
  // 构建字符串池
  const strings = [];
  let stringOffset = 0;
  const addStr = (s) => {
    const bytes = new TextEncoder().encode(s);
    const off = stringOffset;
    strings.push({ data: bytes, offset: off, length: bytes.length + 1 });
    stringOffset += bytes.length + 1;
    return off;
  };

  // 元数据字符串
  const catOff = addStr(category);
  const emptyOff = addStr('');
  const verOff = addStr(version);
  const titleOff = addStr(title);

  // 诗词字符串
  const poems = [];
  for (let i = 0; i < count; i++) {
    const tOff = addStr(`新诗词${i + 1}`);
    const aOff = addStr('佚名');
    const dOff = addStr('');
    const sOff = addStr('诗词内容');
    poems.push({ titleOff: tOff, authorOff: aOff, dynastyOff: dOff, stanzaOff: sOff });
  }

  const stringPoolStart = poemBlocksStart + count * (4 + 8 * 12);
  const stringPoolBytes = strings.reduce((acc, s) => {
    acc.push(...s.data, 0);
    return acc;
  }, []);

  // 计算总大小
  const totalSize = stringPoolStart + stringPoolBytes.length + 8; // +8 for empty image data

  // 构建二进制
  const buf = new ArrayBuffer(totalSize);
  const view = new DataView(buf);
  const data = new Uint8Array(buf);

  // 文件头
  view.setUint32(0, Date.now() & 0xFFFFFF, true); // file_id
  view.setUint32(4, 0, true);
  view.setUint32(8, 0, true); // hash1
  view.setUint32(12, 0, true); // hash2
  view.setUint16(16, 1, true); // version
  view.setUint16(18, 0, true);
  view.setUint16(20, 0, true);
  view.setUint16(22, 0, true);
  view.setUint32(24, 0, true);
  view.setUint32(28, count, true); // poem_count
  view.setUint32(32, totalSize - 40, true); // data_size
  view.setUint32(36, 0, true);
  view.setUint32(40, 1, true);

  // 元数据段表
  view.setUint32(0x2c, metaCount, true);
  let off = 0x30;
  const metaEntries = [
    { ptr: stringPoolStart + catOff, type: 0, seq: 1, size: strings[0].length },
    { ptr: stringPoolStart + emptyOff, type: 0, seq: 2, size: 1 },
    { ptr: stringPoolStart + verOff, type: 2, seq: 3, size: strings[2].length },
    { ptr: stringPoolStart + titleOff, type: 2, seq: 4, size: strings[3].length },
  ];
  for (const m of metaEntries) {
    view.setUint32(off, m.ptr, true);
    view.setUint16(off + 4, m.type, true);
    view.setUint16(off + 6, m.seq, true);
    view.setUint32(off + 8, m.size, true);
    off += 12;
  }

  // 诗词偏移数组
  const offsetArrayStart = off;
  for (let i = 0; i < count; i++) {
    view.setUint32(offsetArrayStart + i * 4, poemBlocksStart + i * (4 + 8 * 12), true);
  }

  // 标题索引区域（填充0）
  // ...

  // 诗词块
  let blockOff = poemBlocksStart;
  for (let i = 0; i < count; i++) {
    const p = poems[i];
    view.setUint32(blockOff, 8, true); // 8 entries
    
    const entries = [
      { type: 0x02, sub: 0, id: 0x0190, p1: strings[4 + i * 4].length, p2: stringPoolStart + p.titleOff },
      { type: 0x02, sub: 0, id: 0x0191, p1: strings[5 + i * 4].length, p2: stringPoolStart + p.authorOff },
      { type: 0x02, sub: 0, id: 0x0193, p1: strings[6 + i * 4].length, p2: stringPoolStart + p.dynastyOff },
      { type: 0x01, sub: 0, id: 0x0192, p1: 4, p2: blockOff }, // stanzas (self-ref, simplified)
      { type: 0x02, sub: 0, id: 0x07d0, p1: strings[7 + i * 4].length, p2: stringPoolStart + p.stanzaOff },
      { type: 0x02, sub: 0, id: 0x0fa0, p1: 1, p2: stringPoolStart + emptyOff },
      { type: 0x02, sub: 0, id: 0x1388, p1: 1, p2: stringPoolStart + emptyOff },
      { type: 0x04, sub: 0, id: 0x0194, p1: 8, p2: stringPoolStart + stringPoolBytes.length },
    ];
    
    for (let j = 0; j < entries.length; j++) {
      const e = entries[j];
      const eoff = blockOff + 4 + j * 12;
      data[eoff] = e.type;
      data[eoff + 1] = e.sub;
      view.setUint16(eoff + 2, e.id, true);
      view.setUint32(eoff + 4, e.p1, true);
      view.setUint32(eoff + 8, e.p2, true);
    }
    
    blockOff += 4 + 8 * 12;
  }

  // 写入字符串池
  for (let i = 0; i < stringPoolBytes.length; i++) {
    data[stringPoolStart + i] = stringPoolBytes[i];
  }

  // 写入空图片magic
  const imgStart = stringPoolStart + stringPoolBytes.length;
  const magic = [0x91, 0x87, 0xA3, 0x98, 0xE3, 0x3B, 0x37, 0xF4];
  for (let i = 0; i < 8; i++) {
    data[imgStart + i] = magic[i];
  }

  // 解析新创建的文件
  parser = new HDParser();
  parser.parse(buf);
  originalFileName = 'new_file.hd';
  isModified = true;
  
  document.querySelector('.modal-overlay').remove();
  updateUI();
  showToast(`已创建新文件: ${count} 首诗词`, 'success');
}

// ============================================================
// UI 更新
// ============================================================
function updateUI() {
  if (!parser) return;

  document.getElementById('tabs').style.display = 'flex';
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('btnSave').disabled = false;
  document.getElementById('btnSaveAs').disabled = false;

  // 更新头部信息
  const h = parser.header;
  document.getElementById('headerInfo').textContent = 
    `${originalFileName} | ID:${h.file_id} | v${h.version_major}.${h.version_minor} | ${parser.poems.length}首`;

  // 更新状态栏
  document.getElementById('statusFile').textContent = `📄 ${originalFileName}`;
  document.getElementById('statusSize').textContent = `📦 ${(parser.fileSize / 1024 / 1024).toFixed(2)} MB`;
  document.getElementById('statusPoems').textContent = `📖 ${parser.poems.length} 首`;

  // 更新诗词列表
  renderPoemList();
  
  // 选择第一首
  if (parser.poems.length > 0) {
    selectPoem(0);
  }
}

function renderPoemList(filter) {
  const list = document.getElementById('poemList');
  list.innerHTML = '';
  document.getElementById('poemCount').textContent = `(${parser.poems.length})`;

  for (const poem of parser.poems) {
    if (filter && !poem.title.includes(filter) && !poem.author.includes(filter)) continue;
    const item = document.createElement('div');
    item.className = 'poem-item';
    if (poem.index - 1 === currentPoemIndex) item.classList.add('active');
    item.innerHTML = `<span class="num">${poem.index}</span><span class="title">${poem.title}</span>`;
    item.onclick = () => selectPoem(poem.index - 1);
    list.appendChild(item);
  }
}

function filterPoems(value) {
  renderPoemList(value);
}

function selectPoem(index) {
  currentPoemIndex = index;
  renderPoemList();
  renderCurrentPoem();
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
  document.querySelectorAll('.tab-pane').forEach(p => {
    p.classList.remove('active');
  });
  document.getElementById('tab-' + tab).classList.add('active');
  renderCurrentPoem();
}

function renderCurrentPoem() {
  if (currentPoemIndex < 0 || !parser) return;
  const poem = parser.poems[currentPoemIndex];

  if (currentTab === 'eink') renderEInk(poem);
  else if (currentTab === 'details') renderDetails(poem);
  else if (currentTab === 'image') renderImage(poem);
  else if (currentTab === 'audio') renderAudio(poem);
  else if (currentTab === 'hex') renderHex(poem);
  else if (currentTab === 'editor') renderEditor(poem);
  else if (currentTab === 'meta') renderMetaEditor();
}

function renderEInk(poem) {
  const container = document.getElementById('tab-eink');
  const hasImage = poem.imgSize > 0;
  
  let html = `
    <div class="eink-device">
      <div class="eink-screen">
        <div class="eink-title">${poem.title || '无题'}</div>
        <div class="eink-author">${poem.dynasty ? `【${poem.dynasty}】` : ''} ${poem.author || '佚名'}</div>
        <div class="eink-divider">━━━━━━━━━━</div>
        <div class="eink-poem-text">${(poem.poemText || []).join('\n').trim() || '（无内容）'}</div>
  `;

    html += `<div class="eink-translation"><strong>译文：</strong>${poem.translations.join('\n')}</div>`;
  }

        <div class="eink-controls">

          <button class="eink-nav-btn" onclick="nextPoem()" ${currentPoemIndex >= parser.poems.length - 1 ? 'disabled' : ''}>下一首 ▶</button>
        </div>
      </div>
    </div>
    <div style="text-align:center;margin-top:12px;font-size:12px;color:var(--eink-gray);">
      ${hasImage ? `🔊 含 MP3 朗读音频 (${(poem.imgSize/1024).toFixed(0)}KB) — 切换到「音频」标签收听` : '无音频数据'}
    </div>
  `;

  container.innerHTML = html;
}

function prevPoem() {
  if (currentPoemIndex > 0) selectPoem(currentPoemIndex - 1);
}

function nextPoem() {
  if (currentPoemIndex < parser.poems.length - 1) selectPoem(currentPoemIndex + 1);
}

function renderDetails(poem) {
  const container = document.getElementById('tab-details');
  
  let html = '<div class="details-container">';

  // 基本信息
  html += `
    <div class="detail-section">
      <h3>📋 诗词信息</h3>
      <div class="detail-row"><span class="detail-label">序号</span><span class="detail-value">${poem.index}</span></div>
      <div class="detail-row"><span class="detail-label">标题</span><span class="detail-value">${poem.title || '—'}</span></div>
      <div class="detail-row"><span class="detail-label">作者</span><span class="detail-value">${poem.author || '—'}</span></div>
      <div class="detail-row"><span class="detail-label">朝代</span><span class="detail-value">${poem.dynasty || '—'}</span></div>
      <div class="detail-row"><span class="detail-label">段落数</span><span class="detail-value">${poem.stanzas}</span></div>
      <div class="detail-row"><span class="detail-label">描述</span><span class="detail-value">${poem.desc || '—'}</span></div>
    </div>
  `;

  // 原文
  if (poem.poemText && poem.poemText.length > 0) {
    html += `<div class="detail-section"><h3>📖 原文</h3>`;
    for (let i = 0; i < poem.poemText.length; i++) {
      html += `<div class="detail-text-block">${poem.poemText[i]}</div>`;
    }
    html += `</div>`;
  }

  // 译文
  if (poem.translations && poem.translations.length > 0) {
    html += `<div class="detail-section"><h3>🔄 译文</h3>`;
    for (const t of poem.translations) {
      html += `<div class="detail-text-block">${t}</div>`;
    }
    html += `</div>`;
  }

  // 注释
  if (poem.annotations && poem.annotations.length > 0) {
    html += `<div class="detail-section"><h3>📝 注释</h3>`;
    for (const a of poem.annotations) {
      html += `<div class="detail-text-block">${a}</div>`;
    }
    html += `</div>`;
  }

  // 图片信息
  html += `
    <div class="detail-section">
      <h3>🖼️ 图片数据</h3>
      <div class="detail-row"><span class="detail-label">大小</span><span class="detail-value">${poem.imgSize} 字节 (${(poem.imgSize/1024).toFixed(1)} KB)</span></div>
      <div class="detail-row"><span class="detail-label">偏移</span><span class="detail-value">0x${poem.imgOffset.toString(16).toUpperCase().padStart(6, '0')}</span></div>
      <div class="detail-row"><span class="detail-label">格式</span><span class="detail-value">厂商私有格式 (8字节magic header)</span></div>
    </div>
  `;

  // 条目列表
  html += `
    <div class="detail-section">
      <h3>🔧 条目列表 (${poem.entryCount} 条)</h3>
      <div class="detail-entry-list">
  `;
  for (const entry of poem.entries) {
    const typeLabel = { 1: 'UINT32', 2: 'STRING', 4: 'IMAGE' }[entry.type] || `0x${entry.type.toString(16)}`;
    const idLabel = getFieldLabel(entry.id);
    let valStr = '';
    if (entry.type === 0x02) valStr = ` → "${entry.text.substring(0, 50)}${entry.text.length > 50 ? '...' : ''}"`;
    else if (entry.type === 0x01) valStr = ` → ${entry.value}`;
    else if (entry.type === 0x04) valStr = ` → ${entry.param1} bytes`;

    html += `
      <div class="detail-entry entry-type-${entry.type}">
        [${entry.id.toString(16).padStart(4, '0')}] ${idLabel} | type=${typeLabel} sub=0x${entry.sub.toString(16).padStart(2, '0')} p1=${entry.param1} p2=0x${entry.param2.toString(16).padStart(8, '0')}${valStr}
      </div>
    `;
  }
  html += `</div></div>`;

  // 块信息
  html += `
    <div class="detail-section">
      <h3>📊 块信息</h3>
      <div class="detail-row"><span class="detail-label">块偏移</span><span class="detail-value">0x${poem.blockOffset.toString(16).toUpperCase().padStart(6, '0')}</span></div>
      <div class="detail-row"><span class="detail-label">块大小</span><span class="detail-value">${poem.blockSize} 字节</span></div>
      <div class="detail-row"><span class="detail-label">条目数</span><span class="detail-value">${poem.entryCount}</span></div>
    </div>
  </div>`;

  container.innerHTML = html;
}

function getFieldLabel(id) {
  const labels = {
    0x0190: '标题',
    0x0191: '作者',
    0x0192: '段落数',
    0x0193: '朝代',
    0x0194: '图片',
    0x0196: '描述',
  };
  if (labels[id]) return labels[id];
  if (id >= 0x07d0 && id < 0x0fa0) return `原文段${id - 0x07d0 + 1}`;
  if (id >= 0x0fa0 && id < 0x1388) return `译文段${id - 0x0fa0 + 1}`;
  if (id >= 0x1388) return `注释${id - 0x1388 + 1}`;
  return `未知(0x${id.toString(16)})`;
}

function renderImageCanvas() {
  const canvas = document.getElementById('imageCanvas');
  if (!canvas || !window._currentImageData) return;

  const { width, height, bpp, mode } = imageViewerState;
  
  try {
    const result = ImageDecoder.decode(window._currentImageData, width, height, bpp, mode);
    if (result) {
      const container = canvas.parentElement;
      container.querySelector('canvas')?.remove();
      result.id = 'imageCanvas';
      result.style.maxWidth = '100%';
      result.style.border = '1px solid var(--border)';
      result.style.imageRendering = 'pixelated';
      container.insertBefore(result, container.querySelector('.image-info'));
      
      document.getElementById('imageInfo').textContent = 
        `${width}x${height} @ ${bpp}bpp | mode=${mode} | payload=${window._currentImageData.length - 8} bytes`;
    }
  } catch (err) {
    document.getElementById('imageInfo').textContent = '渲染错误: ' + err.message;
  }
}

function autoDetectImage() {
  showToast('正在自动检测...', 'info');
  setTimeout(() => {
    const best = ImageDecoder.autoDetect(window._currentImageData);
    if (best.width > 0) {
      imageViewerState = { width: best.width, height: best.height, bpp: best.bpp, mode: best.mode };
      
      const imgMode = document.getElementById('imgMode');
      const imgBpp = document.getElementById('imgBpp');
      const imgWidth = document.getElementById('imgWidth');
      const imgHeight = document.getElementById('imgHeight');
      if (imgMode) imgMode.value = best.mode;
      if (imgBpp) imgBpp.value = best.bpp;
      if (imgWidth) imgWidth.value = best.width;
      if (imgHeight) imgHeight.value = best.height;
      
      renderImageCanvas();
      showToast(`最佳: ${best.width}x${best.height} @ ${best.bpp}bpp (${best.mode}) score=${best.score.toFixed(3)}`, 'success');
    } else {
      showToast('未找到匹配的尺寸组合', 'error');
    }
  }, 100);
}

// ============================================================
// 音频播放器 (MP3 解码) — V4 算法
// ============================================================
// .hd 文件的 type=4 数据块是加密的 MP3 音频。
//
// 实际结构（v4 验证结论）：
//   - 8 字节魔数: 91 87 a3 98 e3 3b 37 f4
//   - 261 字节自定义元数据头
//   - MP3 帧流 (MPEG-1 Layer III, 48kbps, 44100Hz)
//   - 加密方式：每 26 帧中只有 1 帧是加密的（157 字节位置随机数据）
//     其它 25 帧是清晰的（156 字节，0xFF 0xFB 0x30 0xC4 头）
//   - 解密算法：识别所有合法 MPEG-1 L3 同步头，按头中计算出的真实帧大小
//     抽取清晰帧；遇到无效帧时向后 200 字节内重新同步；保留所有清晰帧。

const MP3_BITRATES_V1L3 = [0, 32, 40, 48, 56, 64, 80, 96, 112, 128, 160, 192, 224, 256, 320, 0];
const MP3_SAMPLERATES   = [44100, 48000, 32000, 0];

function parseMp3FrameHeader(data, off) {
  // 验证 MPEG-1 Layer III 帧头，返回帧大小与采样率/bitrate/通道信息
  if (off + 4 > data.length) return null;
  const b0 = data[off], b1 = data[off + 1], b2 = data[off + 2], b3 = data[off + 3];
  if (b0 !== 0xFF) return null;
  if ((b1 & 0xE0) !== 0xE0) return null;     // 同步位
  const versionId = (b1 >> 3) & 0x3;        // 3 = MPEG-1
  const layer     = (b1 >> 1) & 0x3;        // 1 = Layer III
  if (versionId !== 3 || layer !== 1) return null;
  const brIdx = (b2 >> 4) & 0xF;
  const srIdx = (b2 >> 2) & 0x3;
  const pad   = (b2 >> 1) & 0x1;
  const channelMode = (b3 >> 6) & 0x3;      // 3 = mono
  if (brIdx < 1 || brIdx > 14) return null; // 0/15 保留
  if (srIdx === 3) return null;
  const bitrate    = MP3_BITRATES_V1L3[brIdx] * 1000;
  const sampleRate = MP3_SAMPLERATES[srIdx];
  if (!bitrate || !sampleRate) return null;
  // 帧大小（字节）= floor(144 * bitrate / sampleRate) + padding
  const frameSize = Math.floor(144 * bitrate / sampleRate) + pad;
  return {
    versionId, layer, bitrate, sampleRate, frameSize, padding: pad,
    channelMode, isMono: channelMode === 3,
    header: [b0, b1, b2, b3]
  };
}

function isValidMp3FramePair(data, off, maxBound) {
  // 双帧验证：偏移 off 处是合法 MPEG-1 L3 头，
  // 且 off + frameSize 处也跟一个合法头（确认不是误中）
  const h = parseMp3FrameHeader(data, off);
  if (!h) return null;
  const next = off + h.frameSize;
  if (next + 4 > maxBound) return null;
  const h2 = parseMp3FrameHeader(data, next);
  if (!h2) return null;
  return h;
}

// ============================================================
// LAME / Xing "Info" 头构造（让浏览器能完整播放 MP3）
// 参考 ffmpeg_decoded 的结构（44 字节 ID3v2 + 182 字节首帧内嵌 LAME Info）
// 我们用更紧凑的方案：4 字节 frame header + 17 字节 sideinfo + 120 字节 LAME Info
// = 141 字节 假首帧（填充到 156 / 157 字节以匹配原 bitrate 帧大小）
// 这样浏览器看到 LAME 头就能正确 seek 与显示时长
// ============================================================
function buildLameInfoBlock(header, okFrames, payloadBytes) {
  // header: parseMp3FrameHeader 解析结果（来自第一个清晰帧）
  // okFrames: 清晰帧数量
  // payloadBytes: okFrames 个清晰帧字节数（不含假首帧）
  // 返回: { fakeFirstFrame: Uint8Array, totalBytes: number, totalFrames: number }
  //
  // LAME Info 结构（120 字节）：
  //   0-3:   "Info" magic
  //   4-7:   flags (0x0F = frames + bytes + TOC + quality)
  //   8-11:  frames (big-endian uint32) - 包含假首帧，所以 +1
  //   12-15: bytes (big-endian uint32) - 整个文件总字节数
  //   16-115: TOC[100] - 100 个文件位置百分比（0-255）
  //   116-119: quality (big-endian uint32) - 编码质量（0=最好）
  //
  // 假首帧: 4 字节 MPEG-1 L3 header + 17 字节 sideinfo (mono) + 120 字节 LAME Info
  //   = 141 字节。填充到 frameSize (156 或 157) 字节以让浏览器在首位位置
  //   计算时长时能正确解析。

  // 假首帧的 MP3 头: 复制原 header 但 channel_mode 设为 3 (mono)
  // 0xFF 0xFB = MPEG-1 Layer III
  // 字节 2: brIdx(高4位) | srIdx(2位) | padding(1位) | private(1位)
  // 字节 3: channel_mode(2位=11) | mode_ext(2位) | copyright(1位) | original(1位) | emphasis(2位)
  const hdr = header.header; // [b0, b1, b2, b3]
  const b0 = 0xFF;
  // b1: 0xFB = 1111 1011 = 11(MPEG-1 sync) 11(version=1) 01(Layer III) 1(protection bit off)
  const b1 = 0xFB;
  // b2: 保留原 brIdx/srIdx/pad
  const b2 = hdr[2];
  // b3: channel_mode = 3 (mono) = 11
  const b3 = 0xC0; // 1100 0000 = mono

  // 假首帧数据: 4 字节 header + 17 字节 sideinfo (全 0) + 120 字节 LAME Info
  // 然后 padding 到 frameSize
  const lameInfo = new Uint8Array(120);

  // magic "Info"
  lameInfo[0] = 0x49; // I
  lameInfo[1] = 0x6E; // n
  lameInfo[2] = 0x66; // f
  lameInfo[3] = 0x6F; // o

  // flags (0x0F)
  lameInfo[4] = 0x00;
  lameInfo[5] = 0x00;
  lameInfo[6] = 0x00;
  lameInfo[7] = 0x0F;

  // total frames = okFrames + 1 (假首帧)
  const totalFrames = okFrames + 1;
  lameInfo[8] = (totalFrames >>> 24) & 0xFF;
  lameInfo[9] = (totalFrames >>> 16) & 0xFF;
  lameInfo[10] = (totalFrames >>> 8) & 0xFF;
  lameInfo[11] = totalFrames & 0xFF;

  // total bytes = 假首帧大小 + payloadBytes
  // 假首帧大小 = frameSize（与原帧大小相同）
  const totalBytes = header.frameSize + payloadBytes;
  lameInfo[12] = (totalBytes >>> 24) & 0xFF;
  lameInfo[13] = (totalBytes >>> 16) & 0xFF;
  lameInfo[14] = (totalBytes >>> 8) & 0xFF;
  lameInfo[15] = totalBytes & 0xFF;

  // TOC[100] - 线性填充（让 seek 正常工作）
  // TOC[i] 表示文件 (i+1)% 处的字节位置（占 totalBytes 的 0-255）
  for (let i = 0; i < 100; i++) {
    // 简单线性映射
    const pos = Math.round((i + 1) * 256 / 100) - 1;
    lameInfo[16 + i] = pos & 0xFF;
  }

  // quality = 0 (best)
  lameInfo[116] = 0x00;
  lameInfo[117] = 0x00;
  lameInfo[118] = 0x00;
  lameInfo[119] = 0x00;

  // 拼装假首帧: 4 + 17 + 120 = 141 字节
  // MPEG-1 mono sideinfo = 17 字节
  const fakeFrame = new Uint8Array(header.frameSize);
  fakeFrame[0] = b0;
  fakeFrame[1] = b1;
  fakeFrame[2] = b2;
  fakeFrame[3] = b3;
  // sideinfo 17 字节: 全 0 (private_bits, scfsi, main_data_begin, etc)
  // 已默认 0
  // LAME Info 120 字节
  for (let i = 0; i < 120; i++) {
    fakeFrame[4 + 17 + i] = lameInfo[i];
  }
  // 剩余字节 (frameSize - 141) 默认 0 (padding)

  return {
    fakeFirstFrame: fakeFrame,
    totalBytes,
    totalFrames
  };
}

function findFirstMp3Frame(rawData) {
  // 在前 2000 字节内搜索第一个真正合法的 MP3 帧（双帧验证）
  const limit = Math.min(2000, rawData.length - 8);
  for (let i = 0; i < limit; i++) {
    const h = isValidMp3FramePair(rawData, i, rawData.length);
    if (h) return { offset: i, header: h };
  }
  return null;
}

function extractMp3(rawData) {
  // 主算法：在加密数据流中提取所有清晰 MP3 帧
  // 策略：
  //   1) 找到第一个合法双帧起点 i0
  //   2) 从 i0 起按帧头计算出的 frameSize 步进
  //   3) 遇到非法/不同步数据：在后续 200 字节内重新搜索合法双帧起点
  //   4) 保留所有清晰帧，跳过加密帧
  //   5) 末尾不足 frameSize 的数据丢弃
  //   6) 在最前面插入一个"假首帧"内嵌 LAME Info 头（让浏览器能完整播放）
  const first = findFirstMp3Frame(rawData);
  if (!first) return null;

  const out = [];
  let i = first.offset;
  let skipped = 0;
  let okFrames = 0;
  const baseHdr = first.header;

  while (i + 4 <= rawData.length) {
    // 1) 先尝试按当前头部继续
    let h = parseMp3FrameHeader(rawData, i);

    // 2) 头部损坏？尝试重新同步
    if (!h) {
      let reSync = -1;
      const searchEnd = Math.min(i + 200, rawData.length - 8);
      for (let j = i + 1; j < searchEnd; j++) {
        const test = isValidMp3FramePair(rawData, j, rawData.length);
        if (test) { reSync = j; break; }
      }
      if (reSync < 0) break;
      skipped += (reSync - i);
      i = reSync;
      h = parseMp3FrameHeader(rawData, i);
      if (!h) break;
    }

    // 3) 帧大小/样本率一致性检查
    if (h.sampleRate !== baseHdr.sampleRate) {
      // 数据流异常：尝试在后续重新同步
      let reSync = -1;
      const searchEnd = Math.min(i + 200, rawData.length - 8);
      for (let j = i + 1; j < searchEnd; j++) {
        const test = isValidMp3FramePair(rawData, j, rawData.length);
        if (test) { reSync = j; break; }
      }
      if (reSync < 0) break;
      skipped += (reSync - i);
      i = reSync;
      continue;
    }

    // 4) 帧超出范围？结束
    if (i + h.frameSize > rawData.length) break;

    // 5) 写入帧
    for (let k = 0; k < h.frameSize; k++) {
      out.push(rawData[i + k]);
    }
    okFrames++;
    i += h.frameSize;
  }

  if (okFrames === 0) return null;

  // 6) 在最前面插入"假首帧"（内嵌 LAME Info 头），让浏览器能 seek 与显示时长
  //    假首帧大小 = baseHdr.frameSize（与原清晰帧一致）
  //    LAME Info 包含：总帧数(okFrames+1)、总字节数、TOC[100]、quality
  const lame = buildLameInfoBlock(baseHdr, okFrames, out.length);
  const finalOut = new Uint8Array(lame.fakeFirstFrame.length + out.length);
  finalOut.set(lame.fakeFirstFrame, 0);
  finalOut.set(out, lame.fakeFirstFrame.length);

  return {
    mp3: finalOut,
    header: baseHdr,
    okFrames: lame.totalFrames,        // 报告总帧数（含假首帧）
    realFrames: okFrames,              // 真实清晰帧数（不含假首帧）
    skippedBytes: skipped,
    startOffset: first.offset,
    hasLameHeader: true,
    totalBytes: lame.totalBytes
  };
}

function getMp3Info(poem) {
  // 获取该诗的 type=4 原始数据
  const raw = parser.getImageData(poem);
  if (!raw) return null;

  const result = extractMp3(raw);
  if (!result) return null;

  const { mp3, header, realFrames, okFrames, skippedBytes, startOffset, hasLameHeader, totalBytes } = result;
  // 浏览器能识别 LAME Info 后会按 okFrames（含假首帧）计算时长
  const durationSec = okFrames * 1152 / header.sampleRate;

  return {
    raw,
    mp3,
    header,
    frameCount: okFrames,    // 含假首帧（LAME Info 里的总帧数）
    realFrames,              // 真实清晰帧数
    skippedBytes,
    startOffset,
    hasLameHeader,
    totalBytes,
    durationSec
  };
}

function renderAudio(poem) {
  const container = document.getElementById('tab-audio');
  if (!poem.imgSize) {
    container.innerHTML = '<div class="empty-state"><p>此诗词无音频数据</p></div>';
    return;
  }

  const info = getMp3Info(poem);
  if (!info) {
    container.innerHTML = '<div class="empty-state"><p>未能解析音频数据</p></div>';
    return;
  }

  const { mp3, header, frameCount, realFrames, durationSec, skippedBytes, startOffset, hasLameHeader, totalBytes } = info;
  const blob = new Blob([mp3], { type: 'audio/mpeg' });
  const url = URL.createObjectURL(blob);
  const mins = Math.floor(durationSec / 60);
  const secs = (durationSec % 60).toFixed(1);
  const skippedKb = (skippedBytes / 1024).toFixed(1);
  const kbps = header.bitrate / 1000;
  const mpegVer = header.versionId === 3 ? '1' : '2';

  // 帧分析（最多 10 帧）
  let frameRows = '';
  let off = 0;
  const showN = Math.min(10, frameCount);
  for (let n = 0; n < showN; n++) {
    const h = parseMp3FrameHeader(mp3, off);
    if (!h) { off += 156; continue; }
    const hdrBytes = [mp3[off], mp3[off+1], mp3[off+2], mp3[off+3]]
      .map(b => b.toString(16).padStart(2, '0')).join(' ');
    frameRows += `<div>[${n.toString().padStart(3, ' ')}] offset=0x${off.toString(16).padStart(5, '0')} 头=${hdrBytes} ${kbps}kbps @ ${h.sampleRate}Hz 帧长=${h.frameSize}B pad=${h.padding} 时长=${(1152/h.sampleRate*1000).toFixed(2)}ms</div>`;
    off += h.frameSize;
  }

  container.innerHTML = `
    <div style="max-width:760px; margin:0 auto; padding:20px;">
      <div class="detail-section">
        <div class="detail-section-title">🔊 音频信息</div>
        <div style="background:#f5f3ee; padding:16px; border-radius:6px; margin-bottom:16px;">
          <p><strong>${poem.title || '无题'}</strong> - ${poem.author || '佚名'}</p>
          <p style="font-size:13px; color:#666; margin-top:8px;">
            格式: MPEG-${mpegVer} Layer III |
            比特率: ${kbps} kbps |
            采样率: ${header.sampleRate} Hz |
            通道: ${header.isMono ? '单声道' : '立体声'} |
            帧数: ${frameCount}（真实 ${realFrames} + 假首帧 1）|
            时长: ${mins}分${secs}秒
          </p>
          <p style="font-size:12px; color:#888; margin-top:4px;">
            原始数据 ${poem.imgSize} 字节 → MP3 ${totalBytes} 字节
            (起始偏移 0x${startOffset.toString(16)}，跳过加密片段 ${skippedKb} KB${hasLameHeader ? '，已内嵌 LAME Info 头' : ''})
          </p>
        </div>

        <div style="background:#fff; border:1px solid var(--border); border-radius:6px; padding:20px; margin-bottom:16px;">
          <div style="text-align:center; margin-bottom:12px; font-size:48px;">🎵</div>
          <audio id="poemAudioPlayer" controls preload="auto" style="width:100%; margin-bottom:8px;">
            <source src="${url}" type="audio/mpeg">
            您的浏览器不支持音频播放
          </audio>
          <div style="display:flex; gap:8px; margin-top:12px; flex-wrap:wrap;">
            <button onclick="document.getElementById('poemAudioPlayer').play()">▶️ 播放</button>
            <button onclick="document.getElementById('poemAudioPlayer').pause()">⏸️ 暂停</button>
            <button onclick="document.getElementById('poemAudioPlayer').currentTime=0">⏮️ 重播</button>
            <button onclick="downloadMp3()">💾 下载 MP3</button>
            <button onclick="playAllPoems()">🎶 连续播放全部</button>
          </div>
        </div>

        <div class="detail-section-title">📊 MP3 帧分析（前 ${showN} 帧）</div>
        <div style="background:#1a1a1a; color:#a8e6a3; padding:12px; border-radius:6px; font-family:var(--mono); font-size:12px; line-height:1.8;">
          ${frameRows}
        </div>

        <div class="detail-section-title" style="margin-top:20px;">🔬 加密分析（V4 算法）</div>
        <div style="background:#fff; border-left:3px solid var(--success); padding:12px 16px; font-size:13px; line-height:1.7;">
          <p><strong>✓ 算法：</strong>逐字节搜索 MPEG-1 Layer III 同步头 (0xFF 0xFx)，双帧校验，按头中 bitrate/采样率计算真实帧大小</p>
          <p><strong>✓ 加密模式：</strong>每 26 帧中第 26 帧为加密片段（157 字节随机数据），其它 25 帧为清晰帧</p>
          <p><strong>✓ 解密：</strong>遇到无效头部时在 200 字节范围内重新同步，跳过加密片段，保留全部清晰帧</p>
          <p><strong>✓ LAME 头：</strong>在最前面插入 1 个假首帧（内嵌 120 字节 LAME Info 头：frames=${frameCount}、bytes=${totalBytes}、TOC[100]、quality），让浏览器能 seek 与显示完整时长，参考 ffmpeg 强解版结构</p>
          <p><strong>✓ 音频规格：</strong>MPEG-${mpegVer} Layer III, ${kbps} kbps, ${header.sampleRate} Hz, ${header.isMono ? '单声道' : '立体声'}</p>
          <p><strong>✓ 提取统计：</strong>共 ${realFrames} 帧清晰数据 + 1 帧 LAME 头 = ${frameCount} 帧总；约 ${mins}分${secs}秒；跳过 ${skippedBytes} 字节加密数据</p>
        </div>
      </div>
    </div>
  `;
}

function downloadMp3() {
  if (!parser || currentPoemIndex < 0) return;
  const poem = parser.poems[currentPoemIndex];
  const info = getMp3Info(poem);
  if (!info) return;

  const filename = `${poem.title || 'poem'}_${poem.author || ''}.mp3`.replace(/[\\/:*?"<>|]/g, '_');
  const blob = new Blob([info.mp3], { type: 'audio/mpeg' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
  showToast(`已导出: ${filename}`, 'success');
}

let playAllQueue = [];
let playAllIndex = 0;

function playAllPoems() {
  if (!parser) return;
  playAllQueue = [];
  for (let j = 0; j < parser.poems.length; j++) {
    if (parser.poems[j].imgSize > 0) playAllQueue.push(j);
  }
  playAllIndex = 0;
  playNextInQueue();
  showToast(`开始连续播放 ${playAllQueue.length} 首诗`, 'success');
}

function playNextInQueue() {
  if (playAllIndex >= playAllQueue.length) {
    showToast('连续播放完成', 'success');
    return;
  }
  const idx = playAllQueue[playAllIndex];
  playAllIndex++;
  currentPoemIndex = idx;
  renderSidebar();
  renderCurrentPoem();
  switchTab('audio');
  setTimeout(() => {
    const player = document.getElementById('poemAudioPlayer');
    if (player) {
      player.play().then(() => {
        player.onended = playNextInQueue;
      }).catch(err => {
        console.error('Play failed:', err);
        playNextInQueue();
      });
    } else {
      playNextInQueue();
    }
  }, 200);
}

function renderHex(poem) {

  let html = '<div class="detail-section"><h3>🔍 诗词块十六进制 (前 1024 字节)</h3><div class="hex-viewer">';

  }
  html += '</div></div>';

  // 图片数据前256字节
  if (poem.imgSize > 0) {
    const imgData = parser.getImageData(poem);

      html += `<div class="hex-line"><span class="hex-offset">${row.offset.toString(16).padStart(8, '0')}</span><span class="hex-bytes">${row.hex}</span><span class="hex-ascii">${row.ascii}</span></div>`;

function renderEditor(poem) {
  const container = document.getElementById('tab-editor');
  
  let html = '<div class="editor-container">';
  
  html += `
    <div class="editor-section">
      <h3>✏️ 编辑诗词 — ${poem.title} (#${poem.index})</h3>
      <div class="editor-field">
        <label>标题 (id: 0x0190)</label>

      </div>
      <div class="editor-field">
        <label>作者 (id: 0x0191)</label>
        <input type="text" id="edit-author" value="${escapeHtml(poem.author)}" />
      </div>
      <div class="editor-field">
        <label>朝代 (id: 0x0193)</label>
        <input type="text" id="edit-dynasty" value="${escapeHtml(poem.dynasty)}" />
      </div>
      <div class="editor-field">
        <label>段落数 (id: 0x0192)</label>

        <label>描述 (id: 0x0196)</label>
        <input type="text" id="edit-desc" value="${escapeHtml(poem.desc)}" />
      </div>
    </div>
  `;

  // 原文编辑
  html += `<div class="editor-section"><h3>📖 原文</h3>`;
  for (let i = 0; i < poem.poemText.length; i++) {
    html += `<div class="editor-field"><label>段落 ${i + 1} (id: 0x${(0x07d0 + i).toString(16)})</label><textarea id="edit-poem-${i}">${escapeHtml(poem.poemText[i])}</textarea></div>`;
  }
  html += `</div>`;

  // 译文编辑
  if (poem.translations.length > 0) {
    html += `<div class="editor-section"><h3>🔄 译文</h3>`;
    for (let i = 0; i < poem.translations.length; i++) {
      html += `<div class="editor-field"><label>译文 ${i + 1} (id: 0x${(0x0fa0 + i).toString(16)})</label><textarea id="edit-trans-${i}">${escapeHtml(poem.translations[i])}</textarea></div>`;
    }
    html += `</div>`;
  }

  // 注释编辑
  if (poem.annotations.length > 0) {
    html += `<div class="editor-section"><h3>📝 注释</h3>`;
    for (let i = 0; i < poem.annotations.length; i++) {
      html += `<div class="editor-field"><label>注释 ${i + 1} (id: 0x${(0x1388 + i).toString(16)})</label><textarea id="edit-annot-${i}">${escapeHtml(poem.annotations[i])}</textarea></div>`;
    }
    html += `</div>`;
  }

  html += `
    <div class="editor-actions">
      <button class="editor-btn save" onclick="savePoemEdit(${poem.index})">💾 保存修改</button>
      <button class="editor-btn cancel" onclick="renderEditor(parser.poems[currentPoemIndex])">↩️ 重置</button>
    </div>
  </div>`;

  container.innerHTML = html;
}

function savePoemEdit(poemIndex) {
  const poem = parser.poems[poemIndex - 1];
  
  for (const entry of poem.entries) {
    if (entry.type === 0x02) {
      let newVal = null;
      if (entry.id === 0x0190) newVal = document.getElementById('edit-title').value;
      else if (entry.id === 0x0191) newVal = document.getElementById('edit-author').value;
      else if (entry.id === 0x0193) newVal = document.getElementById('edit-dynasty').value;
      else if (entry.id === 0x0196) newVal = document.getElementById('edit-desc').value;
      else if (entry.id >= 0x07d0 && entry.id < 0x0fa0) {
        const el = document.getElementById(`edit-poem-${entry.id - 0x07d0}`);
        if (el) newVal = el.value;
      } else if (entry.id >= 0x0fa0 && entry.id < 0x1388) {
        const el = document.getElementById(`edit-trans-${entry.id - 0x0fa0}`);
        if (el) newVal = el.value;
      } else if (entry.id >= 0x1388) {
        const el = document.getElementById(`edit-annot-${entry.id - 0x1388}`);
        if (el) newVal = el.value;
      }
      
      if (newVal !== null && newVal !== entry.text) {
        entry.text = newVal;
        entry._modified = true;
        // 更新poem对象的字段
        if (entry.id === 0x0190) poem.title = newVal;
        else if (entry.id === 0x0191) poem.author = newVal;
        else if (entry.id === 0x0193) poem.dynasty = newVal;
        else if (entry.id === 0x0196) poem.desc = newVal;
        else if (entry.id >= 0x07d0 && entry.id < 0x0fa0) {
          poem.poemText[entry.id - 0x07d0] = newVal;
        } else if (entry.id >= 0x0fa0 && entry.id < 0x1388) {
          poem.translations[entry.id - 0x0fa0] = newVal;
        } else if (entry.id >= 0x1388) {
          poem.annotations[entry.id - 0x1388] = newVal;
        }
        isModified = true;
      }
    }
  }

  // 更新段落数
  const stanzasInput = document.getElementById('edit-stanzas');
  if (stanzasInput) {
    const newStanzas = parseInt(stanzasInput.value) || 0;
    for (const entry of poem.entries) {
      if (entry.type === 0x01 && entry.id === 0x0192) {
        entry.value = newStanzas;
        poem.stanzas = newStanzas;
        break;
      }
    }
  }

  showToast('诗词修改已保存（点击「保存」写入文件）', 'success');
  renderPoemList();
  renderCurrentPoem();
}

│         书名、分类、版本等                │
├─────────────────────────────────────────┤
│ 0x0088  诗词偏移数组 (${h.poem_count}×4 bytes)     │
│         指向各诗词描述块                  │
├─────────────────────────────────────────┤
│ 0x01B4  标题索引 (${h.poem_count}×24 bytes)        │
│         序号+标题字符串指针               │
├─────────────────────────────────────────┤
│ 0x08BC  诗词描述块 (${h.poem_count}个)             │
│         12字节条目: type/sub/id/p1/p2    │
├─────────────────────────────────────────┤
│ 0x4D40  字符串池 (~256 bytes)            │
│         UTF-8字符串, null终止             │
├─────────────────────────────────────────┤
│ 0x5258  图片数据 (13.6 MB)               │
│         75张预渲染位图(私有格式)          │
├─────────────────────────────────────────┤
│ 末尾    注释文本 (~4 KB)                 │
└─────────────────────────────────────────┘</div>
    </div>

    <div class="editor-section">
      <h3>🔑 条目类型说明</h3>
      <div class="detail-row"><span class="detail-label">type=0x01</span><span class="detail-value">UINT32 数值 (param2 指向4字节值)</span></div>
      <div class="detail-row"><span class="detail-label">type=0x02</span><span class="detail-value">UTF-8 字符串 (param1=字节长度含null, param2=偏移)</span></div>
      <div class="detail-row"><span class="detail-label">type=0x04</span><span class="detail-value">图片数据 (param1=字节大小, param2=偏移)</span></div>
    </div>

    <div class="editor-section">
      <h3>🔑 字段ID语义</h3>
      <div class="detail-row"><span class="detail-label">0x0190</span><span class="detail-value">标题</span></div>
      <div class="detail-row"><span class="detail-label">0x0191</span><span class="detail-value">作者</span></div>
      <div class="detail-row"><span class="detail-label">0x0192</span><span class="detail-value">段落数 (UINT32)</span></div>
      <div class="detail-row"><span class="detail-label">0x0193</span><span class="detail-value">朝代</span></div>
      <div class="detail-row"><span class="detail-label">0x0194</span><span class="detail-value">图片</span></div>
      <div class="detail-row"><span class="detail-label">0x0196</span><span class="detail-value">描述</span></div>
      <div class="detail-row"><span class="detail-label">0x07D0+N</span><span class="detail-value">原文第N段</span></div>
      <div class="detail-row"><span class="detail-label">0x0FA0+N</span><span class="detail-value">译文第N段</span></div>
      <div class="detail-row"><span class="detail-label">0x1388+N</span><span class="detail-value">注释第N条</span></div>
    </div>
  </div>`;

  container.innerHTML = html;
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function showToast(msg, type) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast ' + (type || '');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
  document.getElementById('statusMsg').textContent = msg;
}

// ============================================================
// 拖拽支持
// ============================================================
let dragCounter = 0;

window.addEventListener('dragenter', (e) => {
  e.preventDefault();
  dragCounter++;
  document.getElementById('dropZone').classList.add('active');
});

window.addEventListener('dragleave', (e) => {
  e.preventDefault();
  dragCounter--;
  if (dragCounter === 0) {
    document.getElementById('dropZone').classList.remove('active');
  }
});

window.addEventListener('dragover', (e) => {
  e.preventDefault();
});

window.addEventListener('drop', (e) => {
  e.preventDefault();
  dragCounter = 0;
  document.getElementById('dropZone').classList.remove('active');
  const file = e.dataTransfer.files[0];
  if (file) loadFile(file);
});

// ============================================================
// 键盘快捷键
// ============================================================
document.addEventListener('keydown', (e) => {
  if (!parser) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  
  if (e.key === 'ArrowLeft' && currentPoemIndex > 0) {
    prevPoem();
  } else if (e.key === 'ArrowRight' && currentPoemIndex < parser.poems.length - 1) {
    nextPoem();
  }
});
